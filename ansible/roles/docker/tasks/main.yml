---
# Role: docker
# Ensures Docker is configured for the target user.
# Docker itself is pre-installed on the DGX Spark — this role does NOT install it.
# It only adds the target user to the docker group for sudo-less access.

- name: Verify Docker is installed
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false
  failed_when: docker_version.rc != 0

- name: Add target user to docker group
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: docker
    append: true
