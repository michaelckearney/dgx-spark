services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:0.18.2
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: false
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama

  personaplex:
    build:
      context: ./personaplex
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8998:8998"
    environment:
      NO_TORCH_COMPILE: "1"
    env_file:
      - ./.env.personaplex
    volumes:
      - personaplex_cache:/root/.cache
    gpus: all

volumes:
  qdrant_data:
  ollama_data:
  open_webui_data:
  personaplex_cache:
